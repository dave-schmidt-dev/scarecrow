<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <g transform="rotate(-8 64 64)">
    <!-- Wooden post -->
    <rect x="59" y="75" width="7" height="48" rx="2" fill="#8B6914"/>
    <rect x="60" y="78" width="2" height="44" fill="#7A5C10" opacity="0.4"/>

    <!-- Crossbar -->
    <rect x="14" y="75" width="97" height="5" rx="2.5" fill="#8B6914"/>
    <rect x="14" y="76" width="97" height="1.5" fill="#7A5C10" opacity="0.3"/>

    <!-- Left hand — floppy glove -->
    <circle cx="16" cy="77" r="5" fill="#D2B48C"/>
    <ellipse cx="12" cy="74" rx="2" ry="3" fill="#D2B48C" transform="rotate(-20 12 74)"/>
    <ellipse cx="15" cy="72" rx="1.5" ry="3" fill="#D2B48C" transform="rotate(-5 15 72)"/>
    <ellipse cx="18" cy="72" rx="1.5" ry="2.5" fill="#D2B48C" transform="rotate(10 18 72)"/>
    <!-- Straw from left sleeve -->
    <line x1="18" y1="76" x2="10" y2="68" stroke="#E8C84A" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="78" x2="6" y2="74" stroke="#DAA520" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="74" x2="8" y2="70" stroke="#D4A017" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Right hand — gripping the microphone -->
    <!-- Mic handle (behind hand) -->
    <rect x="106" y="68" width="5" height="20" rx="2.5" fill="#555" transform="rotate(15 108 78)"/>
    <!-- Mic head -->
    <ellipse cx="109" cy="66" rx="6" ry="8" fill="#333" transform="rotate(15 108 78)"/>
    <ellipse cx="109" cy="64" rx="5.5" ry="5" fill="#555" transform="rotate(15 108 78)"/>
    <!-- Mic grille lines -->
    <line x1="105" y1="62" x2="113" y2="60" stroke="#666" stroke-width="0.6" transform="rotate(15 108 78)"/>
    <line x1="105" y1="64" x2="113" y2="62" stroke="#666" stroke-width="0.6" transform="rotate(15 108 78)"/>
    <line x1="105" y1="66" x2="113" y2="64" stroke="#666" stroke-width="0.6" transform="rotate(15 108 78)"/>
    <!-- Hand wrapping around handle -->
    <ellipse cx="109" cy="76" rx="5" ry="4" fill="#D2B48C" transform="rotate(15 108 78)"/>
    <ellipse cx="107" cy="73" rx="2" ry="3.5" fill="#D2B48C" transform="rotate(5 107 73)"/>
    <ellipse cx="111" cy="73" rx="2" ry="3.5" fill="#D2B48C" transform="rotate(25 111 73)"/>
    <ellipse cx="113" cy="76" rx="1.8" ry="3" fill="#D2B48C" transform="rotate(30 113 76)"/>
    <!-- Straw from right sleeve -->
    <line x1="107" y1="78" x2="118" y2="74" stroke="#DAA520" stroke-width="2" stroke-linecap="round"/>
    <line x1="108" y1="80" x2="116" y2="82" stroke="#E8C84A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Shirt body — blue chambray like the movie -->
    <path d="M 38 75 L 36 102 Q 62 110 89 102 L 87 75 Z" fill="#4A7FAC"/>
    <path d="M 38 75 L 36 102 Q 62 110 89 102 L 87 75 Z" fill="none" stroke="#3A6A8F" stroke-width="1"/>
    <!-- Shirt patches -->
    <rect x="44" y="84" width="10" height="8" rx="1" fill="#5B94BF" transform="rotate(-5 49 88)"/>
    <rect x="70" y="88" width="8" height="10" rx="1" fill="#3D7099" transform="rotate(8 74 93)"/>
    <!-- Rope belt -->
    <path d="M 38 98 Q 62 104 87 98" fill="none" stroke="#C4A35A" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 62 101 L 60 108 L 66 108 L 64 101" fill="#C4A35A"/>

    <!-- Neck -->
    <rect x="56" y="64" width="13" height="12" rx="3" fill="#D2B48C"/>

    <!-- Head — burlap sack, tilted -->
    <g transform="rotate(12 62 46)">
      <circle cx="62" cy="46" r="22" fill="#D2B48C"/>
      <circle cx="62" cy="46" r="22" fill="none" stroke="#B8976A" stroke-width="1.2"/>

      <!-- Burlap texture lines -->
      <line x1="44" y1="40" x2="80" y2="40" stroke="#C4A87A" stroke-width="0.5" opacity="0.4"/>
      <line x1="44" y1="46" x2="80" y2="46" stroke="#C4A87A" stroke-width="0.5" opacity="0.4"/>
      <line x1="44" y1="52" x2="80" y2="52" stroke="#C4A87A" stroke-width="0.5" opacity="0.4"/>

      <!-- Patch (darker burlap square with cross-stitch) -->
      <rect x="70" y="34" width="9" height="9" rx="1" fill="#B8976A" transform="rotate(18 74 38)"/>
      <line x1="70" y1="34" x2="79" y2="43" stroke="#8B7355" stroke-width="0.8" transform="rotate(18 74 38)"/>
      <line x1="79" y1="34" x2="70" y2="43" stroke="#8B7355" stroke-width="0.8" transform="rotate(18 74 38)"/>

      <!-- Eyes — triangles like the movie -->
      <polygon points="52,42 58,42 55,48" fill="#2C1810"/>
      <polygon points="65,42 71,42 68,48" fill="#2C1810"/>

      <!-- Nose — small triangle -->
      <polygon points="60,48 64,48 62,52" fill="#A0845C"/>

      <!-- Stitched smile — wide and friendly like the movie -->
      <path d="M 50 54 Q 55 60 62 60 Q 69 60 74 54" fill="none" stroke="#2C1810" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Stitch marks on smile -->
      <line x1="50" y1="52" x2="50" y2="56" stroke="#2C1810" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="55" y1="55" x2="55" y2="59" stroke="#2C1810" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="62" y1="58" x2="62" y2="62" stroke="#2C1810" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="69" y1="55" x2="69" y2="59" stroke="#2C1810" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="74" y1="52" x2="74" y2="56" stroke="#2C1810" stroke-width="1.2" stroke-linecap="round"/>
    </g>

    <!-- Hat — floppy pointed cone like the movie, tilted with head -->
    <g transform="rotate(12 62 46)">
      <!-- Hat brim — wide and floppy -->
      <ellipse cx="62" cy="28" rx="30" ry="7" fill="#5C4033"/>
      <ellipse cx="62" cy="28" rx="30" ry="7" fill="none" stroke="#4A3328" stroke-width="0.8"/>
      <!-- Hat cone — tall, slightly bent -->
      <path d="M 42 28 L 58 -2 Q 62 -6 66 -2 L 82 28 Z" fill="#5C4033"/>
      <path d="M 42 28 L 58 -2 Q 62 -6 66 -2 L 82 28" fill="none" stroke="#4A3328" stroke-width="0.8"/>
      <!-- Hat band -->
      <path d="M 44 26 Q 62 20 80 26" fill="none" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
      <!-- Straw from hat -->
      <line x1="48" y1="26" x2="38" y2="16" stroke="#E8C84A" stroke-width="2" stroke-linecap="round"/>
      <line x1="76" y1="26" x2="86" y2="14" stroke="#DAA520" stroke-width="2" stroke-linecap="round"/>
      <line x1="52" y1="24" x2="40" y2="20" stroke="#D4A017" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="74" y1="24" x2="84" y2="18" stroke="#E8C84A" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
