repos:
  - repo: local
    hooks:
      - id: repo-policy
        name: repo-policy
        entry: .venv/bin/python scripts/check_repo_policy.py --staged-only
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: pre-push-pytest
        name: pre-push-pytest
        entry: bash scripts/run_test_suite.sh
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.15
    hooks:
      - id: vulture
        args:
          - scarecrow/
          - vulture_whitelist.py
          - --min-confidence=80
          - "--ignore-names=inter_op_num_threads,intra_op_num_threads,log_severity_level"
